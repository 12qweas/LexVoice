name: Release Obsidian plugin

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example 1.2.1"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release ref
        id: release_ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_ref.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Validate release files
        shell: bash
        run: |
          VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$VERSION" != "${{ steps.release_ref.outputs.tag }}" ]; then
            echo "manifest.json version $VERSION does not match tag ${{ steps.release_ref.outputs.tag }}"
            exit 1
          fi
          test -s main.js
          test -s manifest.json
          test -s styles.css

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Upload Obsidian release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release_ref.outputs.tag }}
        shell: bash
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "LexVoice $TAG" --notes "Automated LexVoice release."
          gh release upload "$TAG" main.js manifest.json styles.css --clobber
