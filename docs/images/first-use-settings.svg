<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="960" viewBox="0 0 1240 960" role="img" aria-labelledby="title desc">
  <title id="title">LexVoice 首次使用配置概览</title>
  <desc id="desc">展示 LexVoice 设置首页中首次使用需要配置的语音转写服务、大模型 API、虚拟声卡、Obsidian 日记和推荐配置路径。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#8d7b73" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #fbf5ed; }
      .panel-line { stroke: #eadbd1; stroke-width: 1; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; fill: #4b4771; }
      .muted { fill: #6b6791; }
      .title { font-size: 34px; font-weight: 750; }
      .h2 { font-size: 25px; font-weight: 760; }
      .h3 { font-size: 21px; font-weight: 740; }
      .body { font-size: 17px; line-height: 1.55; }
      .small { font-size: 14px; }
      .tab { font-size: 18px; }
      .card { fill: #fff9f3; stroke: #eadbd1; stroke-width: 1; rx: 7; }
      .row { fill: #fbf7f4; rx: 14; }
      .primary { fill: #dd8c8f; stroke: #c9797c; stroke-width: 1; rx: 7; filter: url(#shadow); }
      .button { fill: #fffefd; stroke: #ded7d3; stroke-width: 1; rx: 7; filter: url(#shadow); }
      .badge { fill: #fff8f0; stroke: #f2b36b; stroke-width: 1; rx: 16; }
      .badge-green { fill: #f8fff5; stroke: #93c47d; stroke-width: 1; rx: 16; }
      .badge-soft { fill: #fffdfb; stroke: #eadbd1; stroke-width: 1; rx: 16; }
      .accent { fill: #e46b34; }
      .green { fill: #57974a; }
      .white { fill: #fff; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1240" height="960"/>

  <g transform="translate(58,58)">
    <text class="text tab" x="24" y="0">LexVoice</text>
    <line x1="0" y1="18" x2="1120" y2="18" class="panel-line"/>
    <line x1="0" y1="18" x2="130" y2="18" stroke="#df8f93" stroke-width="3"/>
    <text class="text tab muted" x="154" y="0">常规</text>
    <text class="text tab muted" x="244" y="0">API</text>
    <text class="text tab muted" x="328" y="0">AI 整理</text>
    <text class="text tab muted" x="454" y="0">进阶</text>
    <text class="text tab muted" x="546" y="0">更新</text>

    <text class="text title" x="24" y="78">LexVoice</text>
    <text class="text body muted" x="198" y="78">0.1.0</text>
    <text class="text body muted" x="0" y="116">在 Obsidian 桌面端完成录音、转写与 AI 整理。首次使用不需要填满所有页面，先完成下面三步即可开始。</text>

    <g transform="translate(0,170)">
      <rect class="primary" x="0" y="0" width="112" height="46"/>
      <text class="white body" x="18" y="30">配置 API</text>
      <rect class="button" x="120" y="0" width="132" height="46"/>
      <text class="text body" x="139" y="30">配置大模型</text>
      <rect class="button" x="260" y="0" width="150" height="46"/>
      <text class="text body" x="279" y="30">打开实时面板</text>
    </g>

    <line x1="0" y1="252" x2="1120" y2="252" class="panel-line"/>
    <text class="text h2" x="24" y="308">前置准备</text>

    <g transform="translate(0,330)">
      <rect class="card" x="0" y="0" width="548" height="284"/>
      <text class="text h3" x="20" y="38">语音转写服务</text>
      <rect class="badge" x="20" y="54" width="66" height="34"/><text class="accent small" x="35" y="76">必填</text>
      <rect class="badge-soft" x="96" y="54" width="138" height="34"/><text class="muted small" x="112" y="76">云端付费 / 本地免费</text>
      <text class="text body muted" x="20" y="126">把录音转换为原始文字。云端方案入门简单；</text>
      <text class="text body muted" x="20" y="156">敏感内容建议部署本地 Whisper、SenseVoice 等服务。</text>
      <rect class="badge" x="20" y="226" width="86" height="34"/><text class="accent small" x="36" y="248">未配置</text>
      <rect class="button" x="378" y="222" width="146" height="46"/><text class="text body" x="395" y="252">配置转写服务</text>

      <rect class="card" x="560" y="0" width="548" height="284"/>
      <text class="text h3" x="580" y="38">大模型 LLM API</text>
      <rect class="badge" x="580" y="54" width="66" height="34"/><text class="accent small" x="595" y="76">推荐</text>
      <rect class="badge-soft" x="656" y="54" width="88" height="34"/><text class="muted small" x="672" y="76">按量付费</text>
      <text class="text body muted" x="580" y="126">用于把原始转写整理为会议纪要、待办、翻译</text>
      <text class="text body muted" x="580" y="156">和自定义场景输出。未配置时只保留转写文本。</text>
      <rect class="badge" x="580" y="226" width="86" height="34"/><text class="accent small" x="596" y="248">未配置</text>
      <rect class="button" x="914" y="222" width="170" height="46"/><text class="text body" x="932" y="252">配置大模型服务</text>

      <rect class="card" x="0" y="296" width="548" height="284"/>
      <text class="text h3" x="20" y="334">虚拟声卡</text>
      <rect class="badge-soft" x="20" y="350" width="128" height="34"/><text class="muted small" x="36" y="372">线上会议适用</text>
      <rect class="badge-soft" x="158" y="350" width="76" height="34"/><text class="muted small" x="178" y="372">可免费</text>
      <text class="text body muted" x="20" y="422">只录本人声音时无需配置；如需采集 Zoom、飞书、</text>
      <text class="text body muted" x="20" y="452">腾讯会议或视频声音，建议安装 VB-Cable、BlackHole。</text>
      <rect class="badge-soft" x="20" y="522" width="96" height="34"/><text class="muted small" x="36" y="544">按需准备</text>
      <rect class="button" x="376" y="518" width="148" height="46"/><text class="text body" x="394" y="548">查看设备指引</text>

      <rect class="card" x="560" y="296" width="548" height="284"/>
      <text class="text h3" x="580" y="334">Obsidian 日记</text>
      <rect class="badge-soft" x="580" y="350" width="66" height="34"/><text class="muted small" x="596" y="372">可选</text>
      <rect class="badge-soft" x="656" y="350" width="76" height="34"/><text class="muted small" x="676" y="372">免费</text>
      <text class="text body muted" x="580" y="422">启用后，处理完成时可把「今日会议概要」与待办</text>
      <text class="text body muted" x="580" y="452">写入当日日记；文件不存在时按日记插件规则创建。</text>
      <rect class="badge-green" x="580" y="522" width="86" height="34"/><text class="green small" x="596" y="544">可稍后</text>
      <rect class="button" x="918" y="518" width="166" height="46"/><text class="text body" x="938" y="548">设置日记概要</text>
    </g>

    <text class="text h2" x="24" y="950">推荐配置路径</text>
  </g>

  <g transform="translate(58,832)">
    <rect class="row" x="0" y="0" width="1120" height="82"/>
    <text class="text h3" x="24" y="34">1. 配置语音转写</text>
    <rect class="badge" x="190" y="12" width="66" height="34"/><text class="accent small" x="205" y="34">必填</text>
    <text class="text body muted" x="24" y="64">先让单次录音能顺利转成文字；云端需要 API Key，本地服务需要提前启动。</text>

    <rect class="row" x="0" y="100" width="1120" height="82"/>
    <text class="text h3" x="24" y="134">2. 配置 LLM API</text>
    <rect class="badge" x="170" y="112" width="66" height="34"/><text class="accent small" x="185" y="134">推荐</text>
    <text class="text body muted" x="24" y="164">用于生成会议纪要、标题、待办、翻译和自定义场景；不配置也能保留原始转写。</text>
  </g>
</svg>
